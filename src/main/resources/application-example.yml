spring:
  application:
    name: RepoLens AI
  
  datasource:
    url: jdbc:h2:mem:repolens
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  ai:
    oci:
      genai:
        # REPLACE WITH YOUR COMPARTMENT OCID
        compartment-id: ocid1.compartment.oc1..YOUR_COMPARTMENT_OCID_HERE
        endpoint: https://inference.generativeai.us-ashburn-1.oci.oraclecloud.com
        chat:
          enabled: true
          options:
            # Choose your model:
            # - openai.gpt-4.1 (GPT-4.1)
            # - openai.gpt-3.5-turbo (GPT-3.5)
            # - meta.llama-3.1-405b-instruct (Llama 3.1)
            # - Or your custom model OCID
            model: openai.gpt-4.1
            temperature: 0.3
            max-tokens: 2000

server:
  port: 8080

# Application Configuration
app:
  ai:
    enabled: true
  scanner:
    max-file-size-kb: 500
    temp-dir: ${java.io.tmpdir}/repolens
  oci:
    config-file: ./OCI_ApiKey/config
    private-key-file: ./OCI_ApiKey/your_private_key.pem

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
spring:
  config:
    activate:
      on-profile: ai

app:
  ai:
    enabled: true

---
# Instructions:
# 1. Copy this file to 'application.yml' (if not exists)
# 2. Replace YOUR_COMPARTMENT_OCID_HERE with your actual compartment OCID
# 3. Update the model ID if using a different model
# 4. Ensure OCI_ApiKey/config file exists with your credentials
# 5. Place your private key in OCI_ApiKey/ directory
#
# Get compartment OCID from:
# - Oracle Cloud Console → Identity & Security → Compartments
