spring:
  application:
    name: RepoLens AI
  
  datasource:
    url: jdbc:h2:mem:repolens
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Application Configuration
app:
  ai:
    enabled: ${APP_AI_ENABLED:false}
  scanner:
    max-file-size-kb: 500
    temp-dir: ${java.io.tmpdir}/repolens

# OCI Configuration (only used when AI is enabled)
oci:
  compartment-id: ${OCI_COMPARTMENT_ID:}
  config-profile: ${OCI_CONFIG_PROFILE:DEFAULT}
  endpoint: ${OCI_ENDPOINT:https://inference.generativeai.us-ashburn-1.oci.oraclecloud.com}
  llama4-model-id: ${OCI_LLAMA4_MODEL_ID:}
  gpt5-model-id: ${OCI_GPT5_MODEL_ID:}
  embed-model-id: ${OCI_EMBED_MODEL_ID:}

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
spring:
  config:
    activate:
      on-profile: ai

app:
  ai:
    enabled: true
