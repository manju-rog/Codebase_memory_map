<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoLens AI</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            color: #fff;
            text-align: center;
            margin-bottom: 50px;
        }

        .search-box {
            position: relative;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 18px 100px 18px 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            background: #151515;
        }

        input::placeholder {
            color: #666;
        }

        button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: #6366f1;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #4f46e5;
        }

        button:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .results {
            display: none;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .answer {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #e0e0e0;
            white-space: pre-wrap;
        }

        .confidence-bar {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .confidence-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }

        .bar {
            height: 5px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.5s;
        }

        .graph {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-graph {
            color: #666;
            font-size: 0.9rem;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #666;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mermaid {
            background: transparent !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RepoLens AI</h1>

        <div class="search-box">
            <input 
                type="text" 
                id="input" 
                placeholder="Ask about the codebase..."
                autofocus
            >
            <button id="btn" onclick="ask()">
                <span id="btnText">Ask</span>
                <span id="spinner" class="spinner" style="display:none"></span>
            </button>
        </div>

        <div class="results" id="results">
            <div class="card" id="errorCard" style="display:none"></div>

            <div class="card">
                <div class="label">Answer</div>
                <div class="answer" id="answer"></div>
                <div class="confidence-bar">
                    <div class="confidence-label">Confidence: <span id="conf">0%</span></div>
                    <div class="bar">
                        <div class="bar-fill" id="barFill"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="label">Visual Graph</div>
                <div class="graph" id="graph">
                    <div class="no-graph">No graph</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#6366f1',
                primaryTextColor: '#e0e0e0',
                primaryBorderColor: '#333',
                lineColor: '#444',
                secondaryColor: '#1a1a1a',
                tertiaryColor: '#0a0a0a'
            }
        });

        async function ask() {
            const q = document.getElementById('input').value.trim();
            if (!q) return;

            // UI state
            document.getElementById('btnText').textContent = 'Thinking...';
            document.getElementById('spinner').style.display = 'inline-block';
            document.getElementById('btn').disabled = true;
            document.getElementById('errorCard').style.display = 'none';

            try {
                const res = await fetch('/api/demo/ask?question=' + encodeURIComponent(q));

                if (!res.ok) throw new Error('Request failed');

                const data = await res.json();
                
                if (data.status === 'error') {
                    throw new Error(data.error || 'Unknown error');
                }
                
                // Show answer
                document.getElementById('answer').textContent = data.answer || 'No answer';
                
                // Show confidence (fixed at 95% for demo)
                const c = 95;
                document.getElementById('conf').textContent = c + '%';
                document.getElementById('barFill').style.width = c + '%';
                
                // Show graph
                const g = document.getElementById('graph');
                if (data.mermaidGraph) {
                    g.innerHTML = '<div class="mermaid">' + data.mermaidGraph + '</div>';
                    mermaid.run({ nodes: g.querySelectorAll('.mermaid') });
                } else {
                    g.innerHTML = '<div class="no-graph">No graph available</div>';
                }
                
                document.getElementById('results').style.display = 'block';

            } catch (e) {
                const err = document.getElementById('errorCard');
                err.textContent = 'Error: ' + e.message;
                err.className = 'card error';
                err.style.display = 'block';
                document.getElementById('results').style.display = 'block';
            } finally {
                document.getElementById('btnText').textContent = 'Ask';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('btn').disabled = false;
            }
        }

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ask();
        });

        // No auto-scan needed for demo
    </script>
</body>
</html>
