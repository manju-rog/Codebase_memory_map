<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoLens AI - Codebase Memory Map</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.2em;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .result-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-box pre {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .example-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .evidence-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #4facfe;
        }

        .evidence-item .file-path {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .evidence-item .node-type {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            margin-right: 10px;
        }

        .confidence-bar {
            background: #e0e0e0;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            transition: width 0.5s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mermaid-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            overflow-x: auto;
        }

        .answer-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #2d3748;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge-success {
            background: #48bb78;
            color: white;
        }

        .badge-warning {
            background: #ed8936;
            color: white;
        }

        .badge-info {
            background: #4299e1;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 RepoLens AI</h1>
            <p class="subtitle">AI-Powered Codebase Memory Map for Spring Boot Repositories</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2>📂 Scan Repository</h2>
                <div class="form-group">
                    <label>Source Type</label>
                    <select id="sourceType" onchange="toggleSourceFields()">
                        <option value="LOCAL">Local Repository</option>
                        <option value="GITHUB">GitHub Repository</option>
                    </select>
                </div>
                <div class="form-group" id="localPathGroup">
                    <label>Local Path</label>
                    <input type="text" id="localPath" value="./sample-repos/mini-bank-api" placeholder="e.g., ./sample-repos/mini-bank-api">
                </div>
                <div class="form-group" id="repoUrlGroup" style="display:none;">
                    <label>GitHub Repository URL</label>
                    <input type="text" id="repoUrl" placeholder="e.g., https://github.com/user/repo.git">
                </div>
                <div class="form-group">
                    <label>Branch</label>
                    <input type="text" id="branch" value="main" placeholder="main">
                </div>
                <button class="btn" onclick="scanRepository()">
                    <span id="scanBtnText">🚀 Scan Repository</span>
                </button>
                
                <div id="scanResult" style="display:none;">
                    <div class="stats" id="scanStats"></div>
                </div>
            </div>

            <div class="card">
                <h2>💡 Quick Actions</h2>
                <button class="btn btn-success" onclick="scanAndAsk('Where is login implemented?')">
                    🔐 Analyze Login Flow
                </button>
                <button class="btn btn-success" onclick="scanAndAsk('Which files are affected if I change user role logic?')">
                    🎯 Impact Analysis
                </button>
                <button class="btn btn-success" onclick="scanAndAsk('Which APIs use UserRepository?')">
                    🔗 Find Dependencies
                </button>
                <button class="btn btn-success" onclick="viewFullGraph()">
                    📊 View Full Graph
                </button>
            </div>
        </div>

        <div class="card">
            <h2>❓ Ask Questions</h2>
            <div class="form-group">
                <label>Scan ID</label>
                <input type="number" id="scanId" value="1" placeholder="Enter scan ID">
            </div>
            <div class="form-group">
                <label>Your Question</label>
                <textarea id="question" placeholder="Ask anything about the codebase..."></textarea>
            </div>
            <div class="example-questions">
                <button class="btn btn-secondary" onclick="setQuestion('Where is login implemented?')">
                    Where is login implemented?
                </button>
                <button class="btn btn-secondary" onclick="setQuestion('Which files are affected if I change user role logic?')">
                    Impact of role changes?
                </button>
                <button class="btn btn-secondary" onclick="setQuestion('Which APIs use UserRepository?')">
                    APIs using UserRepository?
                </button>
                <button class="btn btn-secondary" onclick="setQuestion('Show me the flow from controller to database for fund transfer')">
                    Fund transfer flow?
                </button>
                <button class="btn btn-secondary" onclick="setQuestion('Which config controls JWT?')">
                    JWT configuration?
                </button>
            </div>
            <button class="btn" onclick="askQuestion()">
                <span id="askBtnText">🤖 Ask AI</span>
            </button>

            <div id="answerResult" style="display:none;"></div>
        </div>
    </div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        let currentScanId = null;

        function toggleSourceFields() {
            const sourceType = document.getElementById('sourceType').value;
            document.getElementById('localPathGroup').style.display = sourceType === 'LOCAL' ? 'block' : 'none';
            document.getElementById('repoUrlGroup').style.display = sourceType === 'GITHUB' ? 'block' : 'none';
        }

        async function scanRepository() {
            const sourceType = document.getElementById('sourceType').value;
            const localPath = document.getElementById('localPath').value;
            const repoUrl = document.getElementById('repoUrl').value;
            const branch = document.getElementById('branch').value;

            const body = sourceType === 'LOCAL' 
                ? { sourceType, localPath, branch }
                : { sourceType, repoUrl, branch };

            const btn = document.getElementById('scanBtnText');
            btn.innerHTML = '<span class="loading"></span> Scanning...';

            try {
                const response = await fetch('/api/repos/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                currentScanId = data.scanId;
                document.getElementById('scanId').value = data.scanId;

                // Poll for completion
                await pollScanStatus(data.scanId);
                
            } catch (error) {
                alert('Error: ' + error.message);
                btn.textContent = '🚀 Scan Repository';
            }
        }

        async function pollScanStatus(scanId) {
            const maxAttempts = 30;
            let attempts = 0;

            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/repos/scans/${scanId}`);
                    const data = await response.json();

                    if (data.status === 'COMPLETED') {
                        clearInterval(interval);
                        displayScanResults(data);
                        document.getElementById('scanBtnText').textContent = '🚀 Scan Repository';
                    } else if (data.status === 'FAILED') {
                        clearInterval(interval);
                        alert('Scan failed: ' + data.errorMessage);
                        document.getElementById('scanBtnText').textContent = '🚀 Scan Repository';
                    }

                    attempts++;
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        document.getElementById('scanBtnText').textContent = '🚀 Scan Repository';
                    }
                } catch (error) {
                    clearInterval(interval);
                    document.getElementById('scanBtnText').textContent = '🚀 Scan Repository';
                }
            }, 1000);
        }

        function displayScanResults(data) {
            const statsHtml = `
                <div class="stat-card">
                    <div class="number">${data.totalFilesScanned}</div>
                    <div class="label">Files Scanned</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.totalNodes}</div>
                    <div class="label">Code Nodes</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.totalEdges}</div>
                    <div class="label">Relationships</div>
                </div>
            `;
            document.getElementById('scanStats').innerHTML = statsHtml;
            document.getElementById('scanResult').style.display = 'block';
        }

        function setQuestion(q) {
            document.getElementById('question').value = q;
        }

        async function askQuestion() {
            const scanId = document.getElementById('scanId').value;
            const question = document.getElementById('question').value;

            if (!question.trim()) {
                alert('Please enter a question');
                return;
            }

            const btn = document.getElementById('askBtnText');
            btn.innerHTML = '<span class="loading"></span> Thinking...';

            try {
                const response = await fetch(`/api/repos/scans/${scanId}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                displayAnswer(data);
                btn.textContent = '🤖 Ask AI';
            } catch (error) {
                alert('Error: ' + error.message);
                btn.textContent = '🤖 Ask AI';
            }
        }

        async function displayAnswer(data) {
            const confidencePercent = Math.round(data.confidence * 100);
            
            let html = `
                <div class="result-box">
                    <h3>💬 Answer</h3>
                    <div class="answer-text">${data.answer}</div>
                    
                    <h3 style="margin-top: 20px;">📊 Confidence</h3>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidencePercent}%">
                            ${confidencePercent}%
                        </div>
                    </div>
            `;

            if (data.evidence && data.evidence.length > 0) {
                html += '<h3 style="margin-top: 20px;">📁 Evidence</h3>';
                data.evidence.forEach(ev => {
                    html += `
                        <div class="evidence-item">
                            <div class="file-path">📄 ${ev.filePath}</div>
                            <span class="node-type">${ev.nodeType}</span>
                            <span>${ev.symbolName}</span>
                            ${ev.lineStart ? `<span class="badge badge-info">Lines ${ev.lineStart}-${ev.lineEnd}</span>` : ''}
                        </div>
                    `;
                });
            }

            if (data.affectedFiles && data.affectedFiles.length > 0) {
                html += '<h3 style="margin-top: 20px;">🎯 Affected Files</h3>';
                data.affectedFiles.slice(0, 10).forEach(file => {
                    html += `
                        <div class="evidence-item">
                            <div class="file-path">📄 ${file.filePath}</div>
                            <span>${file.reason}</span>
                        </div>
                    `;
                });
            }

            if (data.graphPathMermaid) {
                html += '<h3 style="margin-top: 20px;">📊 Visual Graph</h3>';
                html += '<div class="mermaid-container"><div class="mermaid">' + data.graphPathMermaid + '</div></div>';
            }

            html += '</div>';

            document.getElementById('answerResult').innerHTML = html;
            document.getElementById('answerResult').style.display = 'block';

            // Render mermaid diagrams
            mermaid.run();
        }

        async function scanAndAsk(question) {
            await scanRepository();
            setTimeout(() => {
                setQuestion(question);
                askQuestion();
            }, 2000);
        }

        async function viewFullGraph() {
            const scanId = document.getElementById('scanId').value || currentScanId || 1;
            
            try {
                const response = await fetch(`/api/repos/scans/${scanId}/graph/mermaid`);
                const mermaid = await response.text();
                
                const html = `
                    <div class="result-box">
                        <h3>📊 Complete Codebase Graph</h3>
                        <div class="mermaid-container">
                            <div class="mermaid">${mermaid}</div>
                        </div>
                    </div>
                `;
                
                document.getElementById('answerResult').innerHTML = html;
                document.getElementById('answerResult').style.display = 'block';
                mermaid.run();
            } catch (error) {
                alert('Error loading graph: ' + error.message);
            }
        }
    </script>
</body>
</html>
